<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>আয়-ব্যয়ের হিসাব | প্রিমিয়াম ট্র্যাকার</title>

  <!-- এক্সটার্নাল লাইব্রেরি -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- কাস্টম স্টাইল শীট -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- হেডার সেকশন -->
    <div class="header">
      <div class="header-top">
        <div class="logo" onclick="switchNav(0)" style="cursor: pointer;">
          <div class="logo-icon">💰</div>
          <h1>আয়-ব্যয়ের<span>হিসাব</span></h1>
        </div>
        <div class="profile-card" id="profileBtn">
          <div class="profile-avatar" id="profileAvatar">👤</div>
          <div class="profile-info">
            <div class="profile-name" id="profileName">ব্যবহারকারী</div>
          </div>
        </div>
      </div>
      <div class="header-bottom">
        <div class="left-area">
          <div class="date-badge" id="headerDate"></div>
        </div>
        <div class="right-area">
          <div class="time-badge" id="liveClock"></div>
          <button class="icon-btn" id="exportDataBtn" title="ব্যাকআপ ডাউনলোড"><i class="fas fa-download"></i></button>
          <button class="icon-btn" id="importDataBtn" title="ব্যাকআপ আপলোড"><i class="fas fa-upload"></i></button>
          <button class="theme-btn" id="themeToggleBtn">🌙</button>
        </div>
      </div>
    </div>

    <!-- ফাইল ইম্পোর্ট ইনপুট -->
    <input type="file" id="importFile" accept=".json" style="display:none">

    <!-- নেভিগেশন বার -->
    <div class="nav" id="navContainer"></div>

    <!-- পেজ কন্টেইনার -->
    <div class="pages">
      <div class="page" id="dashboardPage"></div>
      <div class="page" id="addPage"></div>
      <div class="page" id="transactionsPage"></div>
      <div class="page" id="reportsPage"></div>
      <div class="page" id="categoriesPage"></div>
      <div class="page" id="recurringPage"></div>
      <div class="page" id="calculatorPage"></div>
      <div class="page" id="savingsPage"></div>
      <div class="page" id="investmentPage"></div>
      <div class="page" id="loanPage"></div>
    </div>

    <!-- টোস্ট নোটিফিকেশন -->
    <div class="toast" id="toast"></div>
  </div>

  <!-- কাস্টম জাভাস্ক্রিপ্ট -->
  <script src="script.js"></script>
</body>
</html>
