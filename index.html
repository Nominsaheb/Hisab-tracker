<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>আয়-ব্যয়ের হিসাব | প্রিমিয়াম ট্র্যাকার</title>

  <!-- ========================================== -->
  <!-- এক্সটার্নাল লাইব্রেরি লিংক                         -->
  <!-- ========================================== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- ========================================== -->
  <!-- কাস্টম সিএসএস ফাইল                           -->
  <!-- ========================================== -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- ========================================== -->
    <!-- হেডার সেকশন (শীর্ষ বার) - পুরোটা হাইড হবে             -->
    <!-- ========================================== -->
    <header class="header" id="mainHeader">
      <div class="header-top" id="headerTop">
        <div class="logo" onclick="switchNav(0)" style="cursor: pointer;">
          <div class="logo-icon">💰</div>
          <h1>আয়-ব্যয়ের<span>হিসাব</span></h1>
        </div>
        <div class="profile-card" id="profileBtn">
          <div class="profile-avatar" id="profileAvatar">👤</div>
          <div class="profile-info">
            <div class="profile-name" id="profileName">ব্যবহারকারী</div>
          </div>
        </div>
      </div>
      <div class="header-bottom" id="headerBottom">
        <div class="left-area">
          <div class="date-badge" id="headerDate"></div>
          <div class="time-badge" id="liveClock"></div>
        </div>
        <div class="right-area">
          <button class="icon-btn" id="exportDataBtn" title="ব্যাকআপ ডাউনলোড"><i class="fas fa-download"></i></button>
          <button class="icon-btn" id="importDataBtn" title="ব্যাকআপ আপলোড"><i class="fas fa-upload"></i></button>
          <button class="theme-btn" id="themeToggleBtn">🌙</button>
        </div>
      </div>
    </header>

    <!-- ========================================== -->
    <!-- ফাইল ইম্পোর্ট ইনপুট (ব্যাকআপ রিস্টোর)              -->
    <!-- ========================================== -->
    <input type="file" id="importFile" accept=".json" style="display:none">

    <!-- ========================================== -->
    <!-- নেভিগেশন বার (ড্যাশবোর্ড, যোগ করুন ইত্যাদি - সবসময় থাকবে) -->
    <!-- ========================================== -->
    <nav class="nav" id="navContainer"></nav>

    <!-- ========================================== -->
    <!-- পেজ কন্টেইনার (সকল পেজ এখানে লোড হবে)               -->
    <!-- ========================================== -->
    <main class="pages" id="pagesContainer">
      <div class="page" id="dashboardPage"></div>
      <div class="page" id="addPage"></div>
      <div class="page" id="transactionsPage"></div>
      <div class="page" id="reportsPage"></div>
      <div class="page" id="categoriesPage"></div>
      <div class="page" id="recurringPage"></div>
      <div class="page" id="calculatorPage"></div>
      <div class="page" id="savingsPage"></div>
      <div class="page" id="investmentPage"></div>
      <div class="page" id="loanPage"></div>
      <div class="page" id="settingsPage"></div>
    </main>

    <!-- ========================================== -->
    <!-- টোস্ট নোটিফিকেশন (শর্ট মেসেজ দেখানোর জন্য)          -->
    <!-- ========================================== -->
    <div class="toast" id="toast"></div>
  </div>

  <!-- ========================================== -->
  <!-- ফ্লোটিং ক্যালকুলেটর বাটন                        -->
  <!-- ========================================== -->
  <button class="floating-calc-btn" id="floatingCalcBtn" title="ক্যালকুলেটর">
    <i class="fas fa-calculator"></i>
  </button>

  <!-- ========================================== -->
  <!-- ক্যালকুলেটর মডাল                               -->
  <!-- ========================================== -->
  <div class="calc-modal" id="calcModal">
    <div class="calc-modal-header">
      <h3>🧮 ক্যালকুলেটর</h3>
      <button class="calc-modal-close" id="calcModalClose">✕</button>
    </div>
    <div class="calculator-display" id="calcDisplayFloating">0</div>
    <div class="calculator-buttons">
      <div class="calc-btn" onclick="calcAppendFloating('7')">7</div>
      <div class="calc-btn" onclick="calcAppendFloating('8')">8</div>
      <div class="calc-btn" onclick="calcAppendFloating('9')">9</div>
      <div class="calc-btn operator" onclick="calcAppendFloating('/')">÷</div>
      <div class="calc-btn" onclick="calcAppendFloating('4')">4</div>
      <div class="calc-btn" onclick="calcAppendFloating('5')">5</div>
      <div class="calc-btn" onclick="calcAppendFloating('6')">6</div>
      <div class="calc-btn operator" onclick="calcAppendFloating('*')">×</div>
      <div class="calc-btn" onclick="calcAppendFloating('1')">1</div>
      <div class="calc-btn" onclick="calcAppendFloating('2')">2</div>
      <div class="calc-btn" onclick="calcAppendFloating('3')">3</div>
      <div class="calc-btn operator" onclick="calcAppendFloating('-')">−</div>
      <div class="calc-btn" onclick="calcAppendFloating('0')">0</div>
      <div class="calc-btn" onclick="calcAppendFloating('.')">.</div>
      <div class="calc-btn" onclick="calcPercentFloating()">%</div>
      <div class="calc-btn operator" onclick="calcAppendFloating('+')">+</div>
      <div class="calc-btn clear" onclick="calcClearFloating()">C</div>
      <div class="calc-btn" onclick="calcAppendFloating('00')">00</div>
      <div class="calc-btn" onclick="calcBackspaceFloating()">⌫</div>
      <div class="calc-btn equals" onclick="calcResultFloating()">=</div>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- কাস্টম জাভাস্ক্রিপ্ট ফাইল                        -->
  <!-- ========================================== -->
  <script src="script.js"></script>
</body>
</html>
